<div class="container mt-5">
    <div class="card">
        <div class="card-header">
            Employee
        </div>
        <div class="card-body">

            <div class="row">
                <div class="col-sm-6">
                    <div class="card">
                        <div class="card-header">
                            Create
                        </div>
                        <div class="card-body">
                            <form [formGroup]="EmployeeFormGroup">
                                <div class="row">
                                    <div class="col-sm-12 mb-3">
                                        <label>Name</label>
                                        <input type="text" formControlName="name" class="form-control" />
                                    </div>
                                    <div class="col-sm-12 mb-3">
                                        <label>Mobile Number</label>
                                        <input type="text" formControlName="mobileNumber" class="form-control" />
                                    </div>
                                    <div class="col-sm-12 mb-3">
                                        <label>Email</label>
                                        <input type="text" formControlName="email" class="form-control" />
                                    </div>
                                    <div class="col-sm-12 mb-3">
                                        <button class="btn btn-primary" type="button" (click)="OnSubmit()">Create</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-sm-6">
                    @if (Employeeary.length == 0){
                        <div class="alert alert-info">
                            No Employees found
                        </div>
                    }
                    <table class="table">
                        @if (Employeeary.length > 0){
                        <thead>
                            <tr>
                                <td>Name</td>
                                <td>Mobile Number</td>
                                <td>Email</td>
                                <td>Action</td>   
                            </tr>
                        </thead>
                    }

                        <tbody>
                             @for (emp of Employeeary; track emp.id) {
                            <tr>
                                <td>{{emp.name}}</td>
                                <td>{{emp.mobileNumber}}</td>
                                <td>{{emp.email}}</td>
                                <td>
                                    <button (click)="FillForm(emp)" class="btn btn-link">Edit</button>
                                    <button (click)="DeleteForm(emp.id)" class="btn btn-link">Delete</button>
                                </td>
                            </tr>
                        }
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
